    window.$docsify = {
        homepage: "readme.md",

            $('[data-fancybox]').fancybox();

        plugins: [
            EditOnGithubPlugin.create("https://github.com/RelaxPic/relaxpic.github.io/blob/master/", null, function (file) {
                if (file.indexOf('en') === -1) {
                    return '编辑此页面'

            function sidebarCard(hook, vm) {
                const cardHtml = '<a class="sidebar-card" href="https://www.aicodemirror.com/register?invitecode=BJ3O1V" target="_blank" rel="noopener"><span class="sidebar-card__tag">开发者推荐</span><strong class="sidebar-card__title">claude / codex / gemini 中转站</strong><span class="sidebar-card__deal">稳定可靠，Token 消耗最低 0.07 折</span><span class="sidebar-card__cta">立即领取邀请优惠</span></a>';

                function placeCard() {
                    const target = window.innerWidth <= 768
                        ? document.querySelector('.content')
                        : document.querySelector('.sidebar-nav');
                    if (!target) {
                        return;
                    }

                    const card = document.querySelector('.sidebar-card') || document.createRange().createContextualFragment(cardHtml).firstElementChild;
                    target.prepend(card);
                }

                hook.doneEach(placeCard);
                window.addEventListener('resize', placeCard);
                hook.mounted(function () {
                    setTimeout(placeCard, 0);
                });
            },
        ],
    }

<script>
    let ts = localStorage.getItem("lastTimestamp");
    let needFresh = !ts;
    if(!ts){
        ts = Date.now();
        localStorage.setItem("lastTimestamp", ts);
    }
    if(window.location.host === "127.0.0.1:8080"){
        needFresh = true
    }
    function refresh() {
        const ts = Date.now();
        fetch("/version?v=" + ts).then(res => res.text()).then(version => {
                localStorage.setItem("lastTimestamp", ts);
                console.log(`localStorage 版本: ${localStorage.getItem("version")} , 远程版本: ${version}`)
                if (localStorage.getItem("version") !== version) {
                    localStorage.setItem("version", version.trim())
                    if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                        navigator.serviceWorker.controller.postMessage({
                            action: 'FORCE_REFRESH_ON',
                            version: version
                        });
                        console.log('已开启强制刷新模式');
                    }
                    window.location.reload();
                }
            }
        )
    }
    window.addEventListener("focus",function () {
        refresh();
    })
    if(needFresh){
        console.log("没有数据,需要强制刷新")
        refresh();
    }else  if(Date.now() - parseInt(ts) > 1000 * 3600){
        console.log("超过时间范围,需要更新数据")
        refresh();
    }
</script>
